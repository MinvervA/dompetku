version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: dompetku_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dompetku_db
      MYSQL_USER: dompetku_user
      MYSQL_PASSWORD: dompetku_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
